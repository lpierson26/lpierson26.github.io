<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Storefront | Locker Room Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #dc2626;
  --blue: #1d4ed8;
  --dark: #0f172a;
  --text: #1e293b;
  --muted: #64748b;
  --bg: #f8fafc;
  --white: #ffffff;
  --border: #e2e8f0;
  --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  --good: #059669;
}

* { box-sizing: border-box; transition: all 0.2s ease; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

.wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

/* HEADER STYLE */
header {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 50px; }

/* STADIUM HERO */
.page-hero {
  padding: 60px 0;
  text-align: center;
  background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), 
              url('https://images.unsplash.com/photo-1517054466905-5c54f8c27a7d?q=80&w=2000&auto=format&fit=crop');
  background-size: cover;
  background-position: center;
  color: white;
  margin-bottom: 40px;
}

.page-hero h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 3rem;
  text-transform: uppercase;
  margin: 0;
}

/* CARDS & GRID */
.card-section {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
  box-shadow: var(--shadow);
}

.grid3 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.item-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s;
}

.item-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }

.photo {
  width: 100%;
  height: 220px;
  background: #f1f5f9;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 15px;
  border: 1px solid var(--border);
}

.photo img { width: 100%; height: 100%; object-fit: contain; }

.title { font-family: 'Oswald', sans-serif; font-size: 20px; text-transform: uppercase; color: var(--dark); }
.sub { font-size: 14px; color: var(--muted); }

/* PILLS */
.pill {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 50px;
  font-weight: 700;
  text-transform: uppercase;
  background: #f1f5f9;
  border: 1px solid var(--border);
}
.pill.good { color: var(--white); background: var(--good); border: none; }
.pill.bad { color: var(--white); background: var(--red); border: none; }
.pill.blue { color: var(--white); background: var(--blue); border: none; }

/* INPUTS & MODAL */
.modalOverlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.8);
  display: none; align-items: center; justify-content: center;
  z-index: 2000; padding: 20px;
}
.modalOverlay.show { display: flex; }

.modal {
  background: var(--white);
  width: 100%; max-width: 500px;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

label { display: block; margin: 15px 0 5px; font-weight: 700; font-size: 13px; color: var(--dark); }
input {
  width: 100%; padding: 12px;
  border-radius: 8px; border: 1px solid var(--border);
  font-family: 'Inter', sans-serif;
}

/* BUTTONS */
button {
  background: var(--red);
  color: white; padding: 12px 20px;
  border-radius: 8px; font-weight: 800;
  text-transform: uppercase; border: none;
  cursor: pointer;
}
button.secondary { background: #f1f5f9; color: var(--dark); border: 1px solid var(--border); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.hr { height: 1px; background: var(--border); margin: 20px 0; }
.hidden { display: none; }
.notice { padding: 12px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 13px; color: #92400e; }
</style>
</head>

<body>

<header>
  <div class="wrap header-inner">
      <a href="index.html"><img src="logo.webp" class="logo" alt="Locker Room Legends"></a>
      <span id="statusPill" class="pill">Checking Stock...</span>
  </div>
</header>

<div class="page-hero">
    <h1>The Storefront</h1>
    <p>Authentic Memorabilia • Limited Releases • Local Pickup</p>
</div>

<main class="wrap">
    <section class="card-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <div class="title">Available Items</div>
                <div class="sub">First person to reserve marks the item as pending.</div>
            </div>
            <button id="btnRefresh" class="secondary">Refresh List</button>
        </div>

        <div id="itemsGrid" class="grid3"></div>
        <div id="pageMsg" class="notice hidden"></div>
    </section>
</main>

<div id="modalOverlay" class="modalOverlay">
    <div class="modal">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <div class="title" id="mTitle">Reserve Item</div>
                <div class="sub" id="mSub">Please provide your details.</div>
            </div>
            <button id="mClose" class="secondary">✕</button>
        </div>

        <div class="hr"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Name</label>
                <input id="buyerName" placeholder="Full Name">
            </div>
            <div>
                <label>Phone</label>
                <input id="buyerPhone" placeholder="(###) ###-####">
            </div>
            <div>
                <label>Email</label>
                <input id="buyerEmail" placeholder="you@email.com">
            </div>
            <div>
                <label>Venmo</label>
                <input id="buyerVenmo" placeholder="@yourVenmo">
            </div>
        </div>

        <button id="mSubmit" style="width: 100%; margin-top: 25px;">Confirm Reservation</button>
        <div id="mMsg" class="notice hidden" style="margin-top: 15px;"></div>
        <p style="font-size: 11px; color: var(--muted); text-align: center; margin-top: 15px;">
            After reserving, please complete payment via Venmo to confirm your purchase.
        </p>
    </div>
</div>

<script>
/** LOGIC FROM YOUR ORIGINAL FILE */
const API_URL = "https://script.google.com/macros/s/AKfycbwBDRTeFsCZuFMOkj8AvPm37ZPqfxQ_BLjPW6u5yxYvNEtGHmDrG4fBU8ap05yGkpK2/exec";

const itemsGrid = document.getElementById("itemsGrid");
const pageMsg = document.getElementById("pageMsg");
const statusPill = document.getElementById("statusPill");
const btnRefresh = document.getElementById("btnRefresh");
const modalOverlay = document.getElementById("modalOverlay");
const mClose = document.getElementById("mClose");
const mSubmit = document.getElementById("mSubmit");
const mTitle = document.getElementById("mTitle");
const mSub = document.getElementById("mSub");
const mMsg = document.getElementById("mMsg");
const buyerName = document.getElementById("buyerName");
const buyerEmail = document.getElementById("buyerEmail");
const buyerPhone = document.getElementById("buyerPhone");
const buyerVenmo = document.getElementById("buyerVenmo");

let state = { items: [], selected: null };

function hide(el){ el.classList.add("hidden"); el.innerHTML = ""; }
function show(el, html){ el.classList.remove("hidden"); el.innerHTML = html; }
function escapeHtml(str){ return String(str||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m])); }

function resolvePhotoUrl(photo){
    const p = String(photo||"").trim();
    if(!p) return "";
    if(p.startsWith("http")){
        if(p.includes("github.com") && p.includes("/blob/")) return p.replace("https://github.com/","https://raw.githubusercontent.com/").replace("/blob/","/");
        const m1=p.match(/drive\.google\.com\/file\/d\/([^/]+)/i);
        if(m1 && m1[1]) return `https://drive.google.com/uc?export=view&id=${m1[1]}`;
        return p;
    }
    return p;
}

async function apiGetItems(){
    const res = await fetch(`${API_URL}?ts=${Date.now()}`, { method:"GET", redirect:"follow" });
    const data = await res.json();
    if(!data?.ok) throw new Error(data?.error || "Bad response");
    return data.items || [];
}

async function apiReserve(payload){
    const res = await fetch(API_URL, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        redirect:"follow",
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!data?.ok) throw new Error(data?.error || "Reserve failed");
    return data;
}

function render(){
    itemsGrid.innerHTML = "";
    hide(pageMsg);
    const available = state.items.filter(x => String(x.status).toUpperCase() === "OPEN").length;
    statusPill.textContent = `${available} ITEMS LIVE`;
    statusPill.className = `pill ${available ? "good" : "bad"}`;

    state.items.forEach(it => {
        const status = String(it.status || "OPEN").toUpperCase();
        const isAvail = status === "OPEN";
        const photoUrl = resolvePhotoUrl(it.imageUrl || it.photo || "");
        const id = String(it.id || it.itemId || "").trim();

        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `
            <div class="photo">${photoUrl ? `<img src="${photoUrl}">` : ""}</div>
            <div class="title">${escapeHtml(it.title)}</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px;">
                <span class="pill blue">$${escapeHtml(it.price)}</span>
                <span class="pill ${isAvail ? "good" : "bad"}">${isAvail ? "Available" : status}</span>
            </div>
            <button class="reserveBtn" data-id="${escapeHtml(id)}" ${isAvail ? "" : "disabled"} style="width:100%; margin-top: 15px;">
                ${isAvail ? "Reserve Now" : "Sold Out"}
            </button>
        `;
        itemsGrid.appendChild(div);
    });

    itemsGrid.querySelectorAll(".reserveBtn").forEach(btn => {
        btn.onclick = () => {
            const it = state.items.find(x => String(x.id || x.itemId).trim() === btn.dataset.id);
            state.selected = it;
            hide(mMsg);
            mTitle.textContent = it.title;
            mSub.textContent = `Reserve for $${it.price}`;
            modalOverlay.classList.add("show");
        };
    });
}

async function refresh(){
    try {
        statusPill.textContent = "Updating...";
        state.items = await apiGetItems();
        render();
    } catch(e) { 
        statusPill.textContent = "Error";
        show(pageMsg, "Failed to load items. Please try again.");
    }
}

mSubmit.onclick = async () => {
    const payload = { 
        action: "reserve", itemId: String(state.selected.id || state.selected.itemId).trim(),
        name: buyerName.value.trim(), email: buyerEmail.value.trim(), phone: buyerPhone.value.trim(), venmo: buyerVenmo.value.trim() 
    };
    if(!payload.name || !payload.venmo) return alert("Name and Venmo are required.");
    
    mSubmit.disabled = true; mSubmit.textContent = "Reserving...";
    try {
        await apiReserve(payload);
        show(mMsg, "<strong>Success!</strong> Item reserved. Please complete your Venmo payment.");
        await refresh();
    } catch(e) { show(mMsg, "Error: " + e.message); }
    finally { mSubmit.disabled = false; mSubmit.textContent = "Confirm Reservation"; }
};

mClose.onclick = () => modalOverlay.classList.remove("show");
btnRefresh.onclick = refresh;
refresh();
</script>
</body>
</html>
