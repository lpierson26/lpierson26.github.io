<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Locker Room Legends — Card Show Tables</title>

<style>
:root{
  --red:#dc2626;
  --blue:#1d4ed8;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --card:#f8fafc;
  --good:#059669;
  --bad:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:linear-gradient(180deg,rgba(29,78,216,.06),rgba(220,38,38,.03));color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
button,a.btn{border:none;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer;background:var(--blue);color:#fff;text-decoration:none}
button.secondary,a.btn.secondary{background:#fff;color:#000;border:1px solid var(--border)}
.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center}
.modal{background:#fff;padding:20px;border-radius:16px;width:500px;max-width:95%}
.hidden{display:none}
</style>
</head>

<body>

<div class="wrap">
<div id="showsGrid"></div>
</div>

<div id="modalOverlay" class="modalOverlay">
<div class="modal">

<h3 id="mTitle"></h3>
<p id="mSub"></p>

<input id="buyerName" placeholder="Name"><br><br>
<input id="buyerPhone" placeholder="Phone"><br><br>
<input id="buyerEmail" placeholder="Email"><br><br>
<input id="buyerVenmo" placeholder="Venmo"><br><br>

<select id="paymentMethod">
<option value="venmo">Venmo</option>
<option value="paypal">PayPal</option>
</select><br><br>

<select id="buyerQty"></select><br><br>

<button id="mSubmit">Reserve Tables</button>

<div id="payNowPanel" class="hidden">
<br>
<strong>Pay now</strong>
<br><br>
<a id="payBtn" class="btn" target="_blank">Pay now</a>
<a id="fallbackLink" class="btn secondary" target="_blank">Fallback</a>
</div>

</div>
</div>

<script>
const API_URL="YOUR_API_URL";
const VENMO_RECEIVER="lockerroomcr";
const PAYPAL_ME_URL="https://paypal.me/LockerRoomLegends";

const showsGrid=document.getElementById("showsGrid");
const modalOverlay=document.getElementById("modalOverlay");
const mTitle=document.getElementById("mTitle");
const mSub=document.getElementById("mSub");
const buyerName=document.getElementById("buyerName");
const buyerPhone=document.getElementById("buyerPhone");
const buyerEmail=document.getElementById("buyerEmail");
const buyerVenmo=document.getElementById("buyerVenmo");
const buyerQty=document.getElementById("buyerQty");
const paymentMethod=document.getElementById("paymentMethod");
const mSubmit=document.getElementById("mSubmit");
const payNowPanel=document.getElementById("payNowPanel");
const payBtn=document.getElementById("payBtn");
const fallbackLink=document.getElementById("fallbackLink");

let state={shows:[],selected:null};

const money=v=>Number(v||0).toFixed(2);

function buildVenmoLink(amount,note){
return `venmo://paycharge?txn=pay&recipients=${VENMO_RECEIVER}&amount=${money(amount)}&note=${encodeURIComponent(note)}`
}

function buildPayPalLink(amount,note){
return `${PAYPAL_ME_URL}/${money(amount)}?note=${encodeURIComponent(note)}`
}

function showPayNow(method,amount,showTitle,qty,name){
const note=`Locker Room Legends • ${showTitle} • Qty ${qty} • ${name}`;

if(method==="paypal"){
payBtn.href=buildPayPalLink(amount,note);
fallbackLink.href=PAYPAL_ME_URL;
}else{
payBtn.href=buildVenmoLink(amount,note);
fallbackLink.href=`https://venmo.com/u/${VENMO_RECEIVER}`;
}

payNowPanel.classList.remove("hidden");
}

async function apiGetShows(){
const r=await fetch(API_URL);
const d=await r.json();
return d.shows||[];
}

function render(){
showsGrid.innerHTML="";
state.shows.forEach(s=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<h3>${s.title}</h3>
<p>$${s.price} • ${s.tablesLeft} left</p>
<button data-id="${s.tableID}">Reserve</button>
`;
showsGrid.appendChild(div);
});
document.querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>openModal(b.dataset.id));
}

function openModal(id){
const s=state.shows.find(x=>x.tableID==id);
state.selected=s;
mTitle.textContent=s.title;
mSub.textContent=`Price $${s.price}`;
buyerQty.innerHTML=Array.from({length:s.tablesLeft},(_,i)=>`<option>${i+1}</option>`).join("");
modalOverlay.style.display="flex";
}

function closeModal(){modalOverlay.style.display="none"}

async function submitReserve(){
const s=state.selected;
const qty=Number(buyerQty.value);
const total=s.price*qty;

showPayNow(
paymentMethod.value,
total,
s.title,
qty,
buyerName.value
);
}

mSubmit.onclick=submitReserve;
modalOverlay.onclick=e=>{if(e.target===modalOverlay)closeModal()}

async function refresh(){
state.shows=await apiGetShows();
render();
}
refresh();
</script>

</body>
</html>
